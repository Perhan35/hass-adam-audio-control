name: Test and Lint

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Validate with hassfest
      uses: home-assistant/actions/hassfest@master

    - name: Validate with HACS
      uses: hacs/action@main
      with:
        category: integration

  test-lib:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install library and test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e lib/
        pip install pytest pytest-cov

    - name: Test library
      run: |
        pytest lib/tests/ -v --cov=pyadamaudiocontroller --cov-report=xml

    - name: Check library coverage threshold
      run: |
        pytest lib/tests/ --cov=pyadamaudiocontroller --cov-fail-under=100

  test-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=custom_components.adam_audio --cov-report=xml

    - name: Check coverage threshold
      run: |
        pytest tests/ --cov=custom_components.adam_audio --cov-fail-under=95
