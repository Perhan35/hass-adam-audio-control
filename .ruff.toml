# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter

    # Project-specific relaxations
    "D213", # multi-line-summary-second-line (conflicts with D212)
    "D205", # missing-blank-line-after-summary (conflicts with narrative docstrings)
    "TRY003", # raise-vanilla-args (HA pattern for error messages)
    "EM101", # raw-string-in-exception
    "EM102", # f-string-in-exception (HA patterns commonly use f-strings)
    "FBT001", # boolean-type-hint-positional-argument (HA entities use bool params)
    "FBT003", # boolean-positional-value-in-call
    "PLR2004", # magic-value-comparison (protocol-specific constants)
    "RUF002", # ambiguous-unicode-character-docstring (em-dash, bullet chars)
    "ARG002", # unused-method-argument (HA platform pattern **kwargs)
    "SIM105", # suppressible-exception (contextlib.suppress not always clearer)
    "TRY300", # try-consider-else
    "D107", # undocumented-public-init (HA entity pattern)
    "D105", # undocumented-magic-method
    "D400", # missing-trailing-period (summary lines without period at end)
    "D415", # missing-terminal-punctuation
    "D401", # non-imperative-mood
    "D101", # undocumented-public-class (HA entities are self-documenting)
    "D102", # undocumented-public-method (HA entity methods are standard)
    "E501", # line-too-long (URLs, error messages, etc.)
    "BLE001", # blind-except (protocol resilience)
    "ANN206", # missing-return-type-class-method (properties)
    "ANN204", # missing-return-type-special-method
    "TCH",    # type-checking blocks
    "PLR0913", # too many arguments
    "SLF001", # private member accessed
    "PLC0415", # import-outside-top-level (deferred/lazy imports for HA patterns)
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # assert is fine in tests
    "ANN",     # type annotations optional in tests
    "D",       # docstring rules relaxed in tests
    "ARG001",  # unused function argument (pytest fixtures)
]
"custom_components/**/oca_*.py" = [
    "D",       # protocol implementation files
    "ANN",     # type annotations
    "N",       # naming conventions
    "S101",    # assert used for protocol validation
    "ARG",     # unused arguments in protocol callbacks
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
