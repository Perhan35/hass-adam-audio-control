repos:
  - repo: local
    hooks:
      - id: sync-version-badge
        name: sync version badge in README
        entry: scripts/sync_version_badge
        language: script
        files: (manifest\.json|README\.md)

      - id: tests-lib
        name: run library tests
        entry: scripts/tests lib
        language: script
        pass_filenames: false
        always_run: true

      - id: tests-integration
        name: run integration tests
        entry: scripts/tests integration
        language: script
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
